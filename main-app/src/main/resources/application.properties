spring.application.name=main-app
my.secret.key=${FOOTBALL_API_KEY}
server.address=0.0.0.0

spring.jpa.database=postgresql
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/football_DB}
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#Flyway
spring.flyway.enabled=true

#Kafka producer
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false


#Kafka Consumer
spring.kafka.consumer.group-id=events-group, database-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.LongDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=org.mainapp.data.MatchEvent

spring.kafka.consumer.properties.spring.json.trusted.packages=*


#Kafka Streams
spring.kafka.streams.application-id=match-analytics-v2
spring.kafka.streams.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.streams.properties.spring.json.trusted.packages=*

#Redis
spring.data.redis.host=redis
spring.data.redis.port=6379
