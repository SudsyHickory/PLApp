services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=football_DB'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=user'
    ports:
      - '5432:5432'

  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'


      KAFKA_LISTENERS: 'INTERNAL://:29092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-broker:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

  simulation-app:
    build: ./main-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    volumes:
      - ./kafka-streams-data:/var/lib/kafka-streams
    environment:
      - SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR=/var/lib/kafka-streams
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/football_DB
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
      - FOOTBALL_API_KEY=${FOOTBALL_API_KEY}
    restart: always

  workers:
    build: ./app-worker
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
    restart: always

  redis:
    image: 'redis:latest'
    ports:
      - "6279:6379"
